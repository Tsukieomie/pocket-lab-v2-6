<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perplexity Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b0d1a;
    --bg2: #111420;
    --bg3: #1a1e30;
    --border: #252a40;
    --text: #e8e8e8;
    --text-dim: #8a8a9a;
    --accent: #20b8cd;
    --accent-orange: #f97316;
    --accent2: #f97316;
    --radius: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    -webkit-app-region: drag;
    flex-shrink: 0;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #logo {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  #header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    -webkit-app-region: no-drag;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }

  /* ── Context bar ── */
  #context-bar {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    display: none;
  }
  #context-bar.visible { display: block; }
  #context-label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #context-label strong { color: var(--accent); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px 20px;
    text-align: center;
    flex: 1;
  }

  .welcome-logo {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  .welcome h2 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }

  .welcome p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    max-width: 240px;
  }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    margin-top: 8px;
  }

  .suggestion {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .suggestion:hover { background: var(--bg3); border-color: var(--accent); }
  .suggestion-icon { color: var(--accent2); font-size: 15px; }

  /* User message */
  .msg-user {
    display: flex;
    justify-content: flex-end;
  }

  .msg-user .bubble {
    background: linear-gradient(135deg, var(--accent-orange), var(--accent));
    color: #fff;
    padding: 10px 14px;
    border-radius: 16px 16px 4px 16px;
    max-width: 85%;
    font-size: 13.5px;
    line-height: 1.5;
    font-weight: 500;
  }

  /* Assistant message */
  .msg-assistant {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg-assistant-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .msg-assistant-logo {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .msg-assistant .content {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-assistant .content p { margin-bottom: 8px; }
  .msg-assistant .content p:last-child { margin-bottom: 0; }
  .msg-assistant .content strong { color: #fff; font-weight: 600; }
  .msg-assistant .content em { color: var(--text-dim); font-style: italic; }
  .msg-assistant .content code {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
    color: var(--accent);
  }
  .msg-assistant .content pre {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .msg-assistant .content pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
  }

  /* Sources */
  .sources-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .source-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .source-chip:hover { background: var(--bg3); border-color: var(--accent); color: var(--text); }
  .source-num {
    background: var(--border);
    border-radius: 3px;
    padding: 0 4px;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* Action buttons */
  .msg-actions {
    display: flex;
    gap: 8px;
    margin-top: 2px;
  }

  .action-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    border-radius: 5px;
    font-size: 14px;
    transition: color 0.15s, background 0.15s;
  }
  .action-btn:hover { color: var(--text); background: var(--bg3); }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 13px;
    padding: 4px 0;
  }

  .dots {
    display: flex;
    gap: 4px;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input area ── */
  #input-area {
    padding: 12px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  #input-box {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 10px 8px 14px;
    transition: border-color 0.15s;
  }
  #input-box:focus-within { border-color: var(--accent); }

  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13.5px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    font-family: inherit;
    overflow-y: auto;
  }
  #input::placeholder { color: var(--text-dim); }

  #input-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  #send-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--accent-orange), var(--accent));
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding: 0 4px;
  }

  #model-badge {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #shortcut-hint {
    font-size: 11px;
    color: var(--text-dim);
  }

  kbd {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 4px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: inherit;
  }

  /* Streaming cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent-orange);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>

<script>
const PPLX_KEY = window.__pplxKey || '';
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const messages = document.getElementById('messages');
const welcome = document.getElementById('welcome');

let history = [];
let isStreaming = false;

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  sendBtn.disabled = !input.value.trim() || isStreaming;
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) send();
  }
});

sendBtn.addEventListener('click', send);

document.getElementById('new-chat-btn').addEventListener('click', () => {
  history = [];
  messages.innerHTML = '';
  messages.appendChild(welcome);
  welcome.style.display = 'flex';
});

document.getElementById('open-perplexity-btn').addEventListener('click', () => {
  if (window.electronAPI) window.electronAPI.openExternal('https://www.perplexity.ai');
});

function sendSuggestion(btn) {
  const text = btn.textContent.trim().replace(/^[^\w]+/, '').trim();
  input.value = text;
  input.dispatchEvent(new Event('input'));
  send();
}

function addUserMsg(text) {
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg-user';
  div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  messages.appendChild(div);
  scrollBottom();
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'msg-assistant';
  div.id = 'thinking';

function copyMsg(btn) {
  const content = btn.closest('.msg-assistant').querySelector('.content');
  navigator.clipboard.writeText(content.innerText).catch(() => {});
  btn.style.color = 'var(--accent)';
  setTimeout(() => btn.style.color = '', 1200);
}

async function send() {
  const text = input.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addUserMsg(text);
  history.push({ role: 'user', content: text });

  const thinkingEl = addThinking();

  try {
    const resp = await fetch('https://api.perplexity.ai/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${PPLX_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'sonar-pro',
        messages: history,
        stream: true,
        max_tokens: 1500
      })
    });

    if (!resp.ok) throw new Error(`API error ${resp.status}`);

    thinkingEl.remove();

    const div = document.createElement('div');
    div.className = 'msg-assistant';
    let contentEl;

    contentEl = div.querySelector('.content');
    contentEl.innerHTML = '<span class="cursor"></span>';
    messages.appendChild(div);
    scrollBottom();

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    let sources = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const j = JSON.parse(data);
          const delta = j.choices?.[0]?.delta?.content || '';
          full += delta;
          contentEl.innerHTML = renderMarkdown(full) + '<span class="cursor"></span>';
          // Grab sources from citations
          if (j.citations) sources = j.citations.map(u => ({ url: u }));
          scrollBottom();
        } catch {}
      }
    }

    // Final render without cursor
    contentEl.innerHTML = renderMarkdown(full);

    // Add sources if any
    if (sources.length > 0) {
      const chips = sources.slice(0, 5).map((s, i) =>
        `<a href="${s.url}" class="source-chip" target="_blank">
          <span class="source-num">${i+1}</span>
          ${escHtml(getDomain(s.url))}
        </a>`
      ).join('');
      const sr = document.createElement('div');
      sr.className = 'sources-row';
      sr.innerHTML = chips;
      div.insertBefore(sr, div.lastChild);
    }

    // Actions row
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.innerHTML = `<button class="action-btn" title="Copy" onclick="copyMsg(this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>`;
    div.appendChild(actions);

    history.push({ role: 'assistant', content: full });

  } catch (err) {
    if (document.getElementById('thinking')) thinkingEl.remove();
    addAssistantMsg(`Sorry, something went wrong: ${err.message}\n\nMake sure your Perplexity API key is set.`, []);
  }

  isStreaming = false;
  sendBtn.disabled = !input.value.trim();
  input.focus();
}

// ── Helpers ──

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch { return url; }
}

function renderMarkdown(text) {
  // Very simple markdown renderer
  let html = escHtml(text);
  // Code blocks
  html = html.replace(/```([^`]+)```/gs, '<pre><code>$1</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<strong>$1</strong>');
  html = html.replace(/^## (.+)$/gm, '<strong>$1</strong>');
  html = html.replace(/^# (.+)$/gm, '<strong>$1</strong>');
  // Bullet lists
  html = html.replace(/^[•\-\*] (.+)$/gm, '• $1');
  // Numbered lists
  html = html.replace(/^\d+\. (.+)$/gm, (m, p) => m);
  // Paragraph breaks
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

function scrollBottom() {
  messages.scrollTop = messages.scrollHeight;
}
