<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perplexity Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0b0d1a; --bg2: #111420; --bg3: #1a1e30; --border: #252a40;
    --text: #e8e8e8; --text-dim: #8a8a9a; --accent: #20b8cd;
    --accent-orange: #f97316; --accent2: #f97316; --radius: 10px; --red: #ef4444;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  #header { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--bg);
    -webkit-app-region: drag; flex-shrink: 0; }
  #header-left { display: flex; align-items: center; gap: 8px; }
  #logo { width: 22px; height: 22px; border-radius: 6px; overflow: hidden;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  #logo img { width: 22px; height: 22px; }
  #header h1 { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
  #header-right { display: flex; align-items: center; gap: 6px; -webkit-app-region: no-drag; }
  .icon-btn { background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 4px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s; }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }

  /* Mode bar */
  #mode-bar { display: flex; gap: 4px; padding: 7px 12px;
    border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
  .mode-btn { background: var(--bg3); border: 1px solid transparent; border-radius: 20px;
    color: var(--text-dim); cursor: pointer; font-size: 11px; font-weight: 500;
    padding: 4px 10px; transition: all 0.15s; font-family: inherit; }
  .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .mode-btn:not(.active):hover { border-color: var(--border); color: var(--text); }

  /* Attach bar */
  #attach-bar { display: none; padding: 6px 12px 0; background: var(--bg); flex-shrink: 0; }
  #attach-bar.visible { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .attach-chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    padding: 3px 8px; font-size: 11px; color: var(--text-dim); display: flex;
    align-items: center; gap: 4px; }
  .attach-chip .rm { background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 13px; padding: 0 2px; line-height: 1; }
  .attach-chip .rm:hover { color: var(--red); }

  /* Messages */
  #messages { flex: 1; overflow-y: auto; padding: 14px; display: flex;
    flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome */
  .welcome { display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 10px; padding: 30px 16px; text-align: center; flex: 1; }
  .welcome-logo { width: 56px; height: 56px; border-radius: 14px; overflow: hidden;
    display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
  .welcome-logo img { width: 56px; height: 56px; }
  .welcome h2 { font-size: 16px; font-weight: 600; }
  .welcome p { font-size: 12px; color: var(--text-dim); line-height: 1.5; max-width: 230px; }
  .suggestions { display: flex; flex-direction: column; gap: 6px; width: 100%; margin-top: 6px; }
  .suggestion { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 9px 12px; text-align: left; cursor: pointer; color: var(--text); font-size: 12px;
    transition: background 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 8px;
    font-family: inherit; }
  .suggestion:hover { background: var(--bg3); border-color: var(--accent); }
  .suggestion-icon { color: var(--accent2); font-size: 14px; }

  /* User bubble */
  .msg-user { display: flex; justify-content: flex-end; flex-direction: column;
    align-items: flex-end; gap: 4px; }
  .msg-user .bubble { background: linear-gradient(135deg, var(--accent-orange), var(--accent));
    color: #fff; padding: 9px 13px; border-radius: 16px 16px 4px 16px;
    max-width: 88%; font-size: 13px; line-height: 1.5; font-weight: 500; }
  .attach-badge { font-size: 10px; color: var(--text-dim); background: var(--bg3);
    border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; }

  /* Assistant message */
  .msg-assistant { display: flex; flex-direction: column; gap: 8px; }
  .msg-assistant-header { display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-dim); }
  .msg-assistant-logo { width: 18px; height: 18px; border-radius: 4px; overflow: hidden;
    flex-shrink: 0; }
  .msg-assistant-logo img { width: 18px; height: 18px; }
  .msg-assistant .content { font-size: 13px; line-height: 1.65; color: var(--text);
    word-break: break-word; }
  .msg-assistant .content p { margin-bottom: 8px; }
  .msg-assistant .content p:last-child { margin-bottom: 0; }
  .msg-assistant .content strong { color: #fff; font-weight: 600; }
  .msg-assistant .content em { color: var(--text-dim); font-style: italic; }
  .msg-assistant .content h1, .msg-assistant .content h2, .msg-assistant .content h3 {
    color: #fff; font-weight: 700; margin: 10px 0 4px; }
  .msg-assistant .content h1 { font-size: 15px; }
  .msg-assistant .content h2 { font-size: 14px; }
  .msg-assistant .content h3 { font-size: 13px; }
  .msg-assistant .content code { background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 5px; font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace; }
  .msg-assistant .content pre { background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; overflow-x: auto; margin: 6px 0; }
  .msg-assistant .content pre .lang-label { font-size: 10px; color: var(--accent);
    display: block; margin-bottom: 6px; font-family: monospace; text-transform: uppercase; }
  .msg-assistant .content pre code { background: none; border: none; padding: 0;
    font-size: 12px; display: block; white-space: pre; }
  .msg-assistant .content ul { padding-left: 16px; margin: 6px 0; }
  .msg-assistant .content ol { padding-left: 18px; margin: 6px 0; }
  .msg-assistant .content li { margin-bottom: 3px; }
  .msg-assistant .content blockquote { border-left: 3px solid var(--accent);
    padding: 4px 0 4px 10px; color: var(--text-dim); margin: 6px 0; }
  .msg-assistant .content a { color: var(--accent); text-decoration: none; }
  .msg-assistant .content a:hover { text-decoration: underline; }

  /* Sources */
  .sources-wrap { display: flex; flex-direction: column; gap: 4px; }
  .sources-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .source-card { display: flex; align-items: center; gap: 5px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px;
    font-size: 11px; color: var(--text-dim); cursor: pointer; text-decoration: none;
    transition: border-color 0.15s, color 0.15s; max-width: 130px; overflow: hidden; }
  .source-card:hover { border-color: var(--accent); color: var(--text); }
  .source-card img { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
  .source-card .src-domain { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .source-num { color: var(--accent); font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .sources-toggle { font-size: 10px; color: var(--accent); cursor: pointer;
    background: none; border: none; padding: 2px 4px; font-family: inherit; }

  /* Thinking */
  .thinking { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-size: 12px; }
  .dots { display: flex; gap: 4px; }
  .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
    animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; } }

  /* Message actions */
  .msg-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  .msg-assistant:hover .msg-actions { opacity: 1; }
  .action-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); cursor: pointer; padding: 4px 8px; font-size: 11px;
    display: flex; align-items: center; gap: 4px; transition: all 0.15s; font-family: inherit; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Input area */
  #input-area { padding: 10px 12px 12px; border-top: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0; }
  #input-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px 10px; display: flex; align-items: flex-end; gap: 6px; transition: border-color 0.15s; }
  #input-box:focus-within { border-color: var(--accent); }
  #input { flex: 1; background: none; border: none; color: var(--text); resize: none;
    font-size: 13px; font-family: inherit; line-height: 1.5; max-height: 120px;
    overflow-y: auto; outline: none; }
  #input::placeholder { color: var(--text-dim); }
  #input-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  #send-btn, #stop-btn { width: 30px; height: 30px; border-radius: 8px; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: opacity 0.15s, background 0.15s; flex-shrink: 0; }
  #send-btn { background: linear-gradient(135deg, var(--accent-orange), var(--accent)); color: #fff; }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #stop-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--red);
    display: none; font-size: 11px; }
  #stop-btn:hover { border-color: var(--red); background: rgba(239,68,68,0.1); }

  #input-footer { display: flex; align-items: center; justify-content: space-between;
    margin-top: 7px; padding: 0 2px; gap: 8px; }
  #model-selector { position: relative; }
  #model-pill { background: none; border: 1px solid var(--border); border-radius: 20px;
    color: var(--text-dim); cursor: pointer; font-size: 11px; padding: 3px 8px;
    display: flex; align-items: center; gap: 4px; transition: all 0.15s; font-family: inherit; }
  #model-pill:hover { border-color: var(--accent); color: var(--text); }
  #model-dropdown { position: absolute; bottom: calc(100% + 4px); left: 0; min-width: 180px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 4px; display: none; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  #model-dropdown.open { display: block; }
  .model-opt { padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
    color: var(--text-dim); transition: background 0.1s, color 0.1s; display: flex;
    align-items: center; justify-content: space-between; }
  .model-opt:hover { background: var(--bg3); color: var(--text); }
  .model-opt.selected { color: var(--accent); }
  .model-opt .model-desc { font-size: 10px; color: var(--text-dim); }
  #token-count { font-size: 11px; color: var(--text-dim); flex: 1; text-align: center; }
  #shortcut-hint { font-size: 10px; color: var(--text-dim); white-space: nowrap; }
  kbd { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px;
    padding: 1px 4px; font-size: 10px; color: var(--text-dim); font-family: inherit; }
  .cursor { display: inline-block; width: 2px; height: 13px; background: var(--accent-orange);
    margin-left: 2px; vertical-align: middle; animation: blink 0.8s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  #input::-webkit-scrollbar { width: 3px; }
  #input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<script>
// ── Constants & State ────────────────────────────────────────────────────────
const PPLX_KEY = window.__pplxKey || '';
let history = [];
let isStreaming = false;
let abortCtrl = null;
let attachedFile = null;
let currentMode = localStorage.getItem('pplx_mode') || 'web';
let currentModel = localStorage.getItem('pplx_model') || 'sonar-pro';

const MODES = {
  web:    { getModel: () => 'sonar-pro',         system: null,                        recency: 'month' },
  chat:   { getModel: () => currentModel,        system: 'You are a helpful assistant.', recency: null },
  reason: { getModel: () => 'sonar-reasoning',   system: null,                        recency: null }
};

// ── Element refs ─────────────────────────────────────────────────────────────
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send-btn');
const stopBtn    = document.getElementById('stop-btn');
const messagesEl = document.getElementById('messages');
const welcomeEl  = document.getElementById('welcome');
const modelPill  = document.getElementById('model-pill');
const modelNameEl= document.getElementById('model-name');
const modelDD    = document.getElementById('model-dropdown');
const tokenEl    = document.getElementById('token-count');
const attachBar  = document.getElementById('attach-bar');

// ── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  setMode(currentMode, false);
  setModel(currentModel, false);
  try {
    const saved = JSON.parse(localStorage.getItem('pplx_history') || 'null');
    if (saved && saved.length) {
      history = saved;
      welcomeEl.style.display = 'none';
      history.forEach(m => {
        if (m.role === 'user') addUserMsgDOM(m.content, m._attach);
        else if (m.role === 'assistant') addAssistantMsgDOM(m.content, m._sources || [], history.indexOf(m));
      });
      scrollBottom();
    }
  } catch(e) {}
})();

// ── Mode ──────────────────────────────────────────────────────────────────────
function setMode(mode, save) {
  currentMode = mode;
  if (save !== false) localStorage.setItem('pplx_mode', mode);
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  if (mode === 'reason') setModel('sonar-reasoning', false);
}
document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));

// ── Model ─────────────────────────────────────────────────────────────────────
function setModel(model, save) {
  currentModel = model;
  if (save !== false) localStorage.setItem('pplx_model', model);
  modelNameEl.textContent = model;
  document.querySelectorAll('.model-opt').forEach(o => o.classList.toggle('selected', o.dataset.model === model));
}
modelPill.addEventListener('click', e => { e.stopPropagation(); modelDD.classList.toggle('open'); });
document.addEventListener('click', () => modelDD.classList.remove('open'));
document.querySelectorAll('.model-opt').forEach(o => {
  o.addEventListener('click', e => { e.stopPropagation(); setModel(o.dataset.model); modelDD.classList.remove('open'); });
});

// ── Input ─────────────────────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  sendBtn.disabled = !inputEl.value.trim() || isStreaming;
  const chars = inputEl.value.length;
  tokenEl.textContent = chars > 10 ? ('~' + Math.round(chars / 4) + ' tok') : '';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
});
sendBtn.addEventListener('click', send);
stopBtn.addEventListener('click', () => { if (abortCtrl) abortCtrl.abort(); });

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key === 'k') { e.preventDefault(); inputEl.focus(); }
  if (mod && e.key === 'n') { e.preventDefault(); newChat(); }
  if (e.key === 'Escape' && isStreaming) { if (abortCtrl) abortCtrl.abort(); }
});

// ── New chat ──────────────────────────────────────────────────────────────────
document.getElementById('new-chat-btn').addEventListener('click', newChat);
function newChat() {
  history = []; localStorage.removeItem('pplx_history');
  messagesEl.innerHTML = ''; messagesEl.appendChild(welcomeEl);
  welcomeEl.style.display = 'flex'; clearAttach();
}

// ── Open Perplexity ───────────────────────────────────────────────────────────
document.getElementById('open-perplexity-btn').addEventListener('click', () => {
  if (window.electronAPI) window.electronAPI.openExternal('https://www.perplexity.ai');
});

// ── File attach ───────────────────────────────────────────────────────────────
document.getElementById('attach-btn').addEventListener('click', async () => {
  if (!window.linuxWrapper) return;
  try {
    const r = await window.linuxWrapper.showOpenDialog({
      properties: ['openFile'],
      filters: [{ name: 'Text / Code', extensions: ['txt','md','js','ts','py','sh','json','yaml','yml','html','css','jsx','tsx','rs','go','c','cpp','h','rb','java','kt','swift'] }]
    });
    if (r.canceled || !r.filePaths.length) return;
    const fp = r.filePaths[0];
    const { content } = await window.linuxWrapper.readTextFile(fp);
    const name = fp.split('/').pop();
    attachedFile = { name, content };
    renderAttachBar();
  } catch(err) { console.error('attach', err); }
});
function renderAttachBar() {
  attachBar.innerHTML = '';
  if (!attachedFile) { attachBar.classList.remove('visible'); return; }
  attachBar.classList.add('visible');
  const chip = document.createElement('div');
  chip.className = 'attach-chip';
  chip.innerHTML = '📎 <span>' + escHtml(attachedFile.name) + '</span><button class="rm" onclick="clearAttach()" title="Remove">&times;</button>';
  attachBar.appendChild(chip);
}
function clearAttach() { attachedFile = null; renderAttachBar(); }

// ── Voice ─────────────────────────────────────────────────────────────────────
document.getElementById('voice-btn').addEventListener('click', () => {
  const btn = document.getElementById('voice-btn');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Speech recognition not available'); return; }
  if (btn._sr) { btn._sr.stop(); btn._sr = null; btn.style.color = ''; return; }
  const sr = new SR();
  sr.continuous = false; sr.interimResults = false; sr.lang = 'en-US';
  sr.onresult = ev => { inputEl.value += ev.results[0][0].transcript + ' '; inputEl.dispatchEvent(new Event('input')); };
  sr.onend = () => { btn.style.color = ''; btn._sr = null; };
  sr.start(); btn._sr = sr; btn.style.color = 'var(--accent-orange)';
});

// ── Send ──────────────────────────────────────────────────────────────────────
function sendSuggestion(btn) {
  const raw = btn.textContent.trim();
  const text = raw.replace(/^[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFEFF\s]+/u, '').trim();
  inputEl.value = text; inputEl.dispatchEvent(new Event('input')); send();
}

function setStreaming(on) {
  isStreaming = on;
  sendBtn.style.display = on ? 'none' : 'flex';
  stopBtn.style.display = on ? 'flex' : 'none';
  if (!on) sendBtn.disabled = !inputEl.value.trim();
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;
  setStreaming(true);
  inputEl.value = ''; inputEl.style.height = 'auto'; tokenEl.textContent = '';

  let userContent = text;
  let attachName = null;
  if (attachedFile) {
    attachName = attachedFile.name;
    userContent = 'File: ' + attachedFile.name + '\n```\n' + attachedFile.content + '\n```\n\n' + text;
    clearAttach();
  }

  addUserMsgDOM(text, attachName);
  const histEntry = { role: 'user', content: userContent };
  if (attachName) histEntry._attach = attachName;
  history.push(histEntry);
  saveHistory();

  const thinkingEl = addThinking();
  const modeConf = MODES[currentMode] || MODES.web;
  const model = modeConf.getModel();

  const msgs = [];
  if (modeConf.system) msgs.push({ role: 'system', content: modeConf.system });
  msgs.push(...history.map(m => ({ role: m.role, content: m.content })));

  const body = { model, messages: msgs, stream: true, max_tokens: 2000 };
  if (modeConf.recency) body.search_recency_filter = modeConf.recency;

  abortCtrl = new AbortController();

  try {
    const resp = await fetch('https://api.perplexity.ai/chat/completions', {
      method: 'POST', signal: abortCtrl.signal,
      headers: { 'Authorization': 'Bearer ' + PPLX_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error('API error ' + resp.status + ' — check your API key');

    thinkingEl.remove();

    const contentEl = document.createElement('div'); contentEl.className = 'content';
    contentEl.innerHTML = '<span class="cursor"></span>';
    msgDiv.appendChild(hdr); msgDiv.appendChild(contentEl);
    messagesEl.appendChild(msgDiv); scrollBottom();

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '', sources = [];

    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        for (const line of chunk.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const j = JSON.parse(data);
            const delta = (j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content) || '';
            full += delta;
            contentEl.innerHTML = renderMarkdown(full) + '<span class="cursor"></span>';
            if (j.citations) sources = j.citations.map(u => ({ url: u }));
            scrollBottom();
          } catch(e) {}
        }
      }
    } catch(e) { if (e.name !== 'AbortError') throw e; }

    contentEl.innerHTML = renderMarkdown(full);
    if (sources.length) msgDiv.appendChild(buildSourcesEl(sources));
    msgDiv.appendChild(buildActionsEl(history.length));

    const histAss = { role: 'assistant', content: full };
    if (sources.length) histAss._sources = sources;
    history.push(histAss);
    saveHistory();

  } catch(err) {
    const th = document.getElementById('thinking');
    if (th) th.remove();
    if (err.name !== 'AbortError') addAssistantMsgDOM('Error: ' + err.message, [], -1);
  }

  setStreaming(false); abortCtrl = null; inputEl.focus();
}

// ── Regenerate ────────────────────────────────────────────────────────────────
function regenerate(btn, histIdx) {
  const msgDiv = btn.closest('.msg-assistant');
  // Remove assistant entry and re-run
  if (history.length > histIdx) history.splice(histIdx);
  // Also remove the preceding user entry to re-add via send()
  const lastUser = history.pop();
  saveHistory();
  msgDiv.remove();
  if (!lastUser) return;
  const cleanText = lastUser.content.replace(/^File: .+?\n```[\s\S]+?```\n\n/m, '');
  inputEl.value = cleanText;
  inputEl.dispatchEvent(new Event('input'));
  send();
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function addUserMsgDOM(text, attachName) {
  welcomeEl.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg-user';
  const badge = attachName ? '<div class="attach-badge">📎 ' + escHtml(attachName) + '</div>' : '';
  div.innerHTML = badge + '<div class="bubble">' + escHtml(text) + '</div>';
  messagesEl.appendChild(div); scrollBottom();
}

function buildSourcesEl(sources) {
  const MAX = 3;
  const wrap = document.createElement('div'); wrap.className = 'sources-wrap';
  const row = document.createElement('div'); row.className = 'sources-row';
  sources.slice(0, 6).forEach(function(s, i) {
    const domain = getDomain(s.url);
    const a = document.createElement('a');
    a.className = 'source-card'; a.href = s.url; a.title = s.url;
    a.setAttribute('onclick', "if(window.electronAPI){window.electronAPI.openExternal(this.href);} return false;");
    a.innerHTML = '<span class="source-num">' + (i+1) + '</span>'
      + '<img src="https://www.google.com/s2/favicons?domain=' + encodeURIComponent(domain) + '&sz=16" alt="" onerror="this.style.display=\'none\'">'
      + '<span class="src-domain">' + escHtml(domain) + '</span>';
    if (i >= MAX) a.style.display = 'none';
    row.appendChild(a);
  });
  wrap.appendChild(row);
  if (sources.length > MAX) {
    const btn = document.createElement('button');
    btn.className = 'sources-toggle';
    var expanded = false;
    btn.textContent = '+' + (sources.length - MAX) + ' more';
    btn.addEventListener('click', function() {
      expanded = !expanded;
      row.querySelectorAll('.source-card').forEach(function(c, i) {
        if (i >= MAX) c.style.display = expanded ? 'flex' : 'none';
      });
      btn.textContent = expanded ? 'Show less' : ('+' + (sources.length - MAX) + ' more');
    });
    wrap.appendChild(btn);
  }
  return wrap;
}

function buildActionsEl(histIdx) {
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.innerHTML = '<button class="action-btn" title="Copy" onclick="copyMsg(this)">'
    + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy</button>'
    + '<button class="action-btn" title="Retry" onclick="regenerate(this,' + histIdx + ')">'
    + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg> Retry</button>';
  return actions;
}

function copyMsg(btn) {
  const content = btn.closest('.msg-assistant').querySelector('.content');
  navigator.clipboard.writeText(content.innerText).catch(function(){});
  const orig = btn.innerHTML;
  btn.innerHTML = '&#10003; Copied'; btn.style.color = 'var(--accent)';
  setTimeout(function() { btn.innerHTML = orig; btn.style.color = ''; }, 1500);
}

  try { localStorage.setItem('pplx_history', JSON.stringify(history)); } catch(e) {}
}

// ── Markdown ──────────────────────────────────────────────────────────────────
function renderMarkdown(text) {
  // Extract code blocks
  var codeBlocks = [];
  var html = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    var idx = codeBlocks.length;
    codeBlocks.push({ lang: lang || '', code: code });
    return '%%CB_' + idx + '%%';
  });

  // Escape HTML
  html = escHtml(html);

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold / italic
  html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  html = html.replace(/__([^_\n]+)__/g, '<strong>$1</strong>');
  html = html.replace(/_([^_\n]+)_/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
    '<a href="$2" onclick="if(window.electronAPI){window.electronAPI.openExternal(this.href);} return false;">$1</a>');

  // Numbered lists
  html = html.replace(/((?:^\d+\. .+\n?)+)/gm, function(block) {
    var items = block.trim().split('\n').map(function(l) { return '<li>' + l.replace(/^\d+\.\s*/, '') + '</li>'; }).join('');
    return '<ol>' + items + '</ol>';
  });

  // Bullet lists
  html = html.replace(/((?:^[-*\u2022] .+\n?)+)/gm, function(block) {
    var items = block.trim().split('\n').map(function(l) { return '<li>' + l.replace(/^[-*\u2022]\s*/, '') + '</li>'; }).join('');
    return '<ul>' + items + '</ul>';
  });

  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';

  // Restore code blocks
  html = html.replace(/%%CB_(\d+)%%/g, function(_, idx) {
    var cb = codeBlocks[parseInt(idx)];
    var label = cb.lang ? '<span class="lang-label">' + escHtml(cb.lang) + '</span>' : '';
    return '<pre>' + label + '<code>' + escHtml(cb.code) + '</code></pre>';
  });

  return html;
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function getDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url; }
}
function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
</script>
