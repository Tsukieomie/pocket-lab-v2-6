# Pocket Lab — Bore Tunnel Server on Fly.io
# Custom bore build: control port patched from 7835 → 2222
app = "pocket-lab-bore"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  build_context = ".."

[[services]]
  internal_port = 2222
  protocol = "tcp"

  [[services.ports]]
    port = 2222

[[services]]
  internal_port = 40000
  protocol = "tcp"

  [[services.ports]]
    port = 40000

[[services]]
  internal_port = 40001
  protocol = "tcp"

  [[services.ports]]
    port = 40001

[[services]]
  internal_port = 40002
  protocol = "tcp"

  [[services.ports]]
    port = 40002

[[services]]
  internal_port = 40003
  protocol = "tcp"

  [[services.ports]]
    port = 40003

[[services]]
  internal_port = 40004
  protocol = "tcp"

  [[services.ports]]
    port = 40004

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
