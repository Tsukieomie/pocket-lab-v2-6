# Pocket Lab — Bore Tunnel Server on Fly.io
# bore-custom-2222 binary listens on port 443 as control port
# We map external 40000 → internal 443 to bypass Fly's 443 TLS interception
app = "pocket-lab-bore"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  build_context = ".."

# Control port: external 40000 → internal 443 (bore-custom-2222 listens on 443)
[[services]]
  internal_port = 443
  protocol = "tcp"
  [[services.ports]]
    port = 40000

# Tunnel ports 40001-40005
[[services]]
  internal_port = 40001
  protocol = "tcp"
  [[services.ports]]
    port = 40001

[[services]]
  internal_port = 40002
  protocol = "tcp"
  [[services.ports]]
    port = 40002

[[services]]
  internal_port = 40003
  protocol = "tcp"
  [[services.ports]]
    port = 40003

[[services]]
  internal_port = 40004
  protocol = "tcp"
  [[services.ports]]
    port = 40004

[[services]]
  internal_port = 40005
  protocol = "tcp"
  [[services.ports]]
    port = 40005

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
