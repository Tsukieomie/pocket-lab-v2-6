name: Approve Pocket Lab Unlock Signed

on:
  workflow_dispatch:
    inputs:
      pdf_sha256:
        description: 'PDF SHA-256 (from iSH nonce output)'
        required: true
      nonce:
        description: 'Nonce (from iSH nonce output)'
        required: true

permissions:
  contents: write

jobs:
  approve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create signed approval
        env:
          PDF_SHA256: ${{ github.event.inputs.pdf_sha256 }}
          NONCE: ${{ github.event.inputs.nonce }}
          APPROVED_BY: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          SIGNING_KEY: ${{ secrets.POCKET_LAB_APPROVAL_SIGNING_KEY }}
        run: |
          set -eu
          # Write the signing key with a restrictive umask into a mktemp path,
          # and guarantee cleanup even on failure via an EXIT trap.
          umask 077
          KEYFILE=$(mktemp /tmp/signing.XXXXXXXX.key)
          PUBFILE=$(mktemp /tmp/signing.XXXXXXXX.pub)
          trap 'rm -f "$KEYFILE" "$PUBFILE"' EXIT

          echo "$SIGNING_KEY" | base64 -d > "$KEYFILE"

          # Derive the public key from the private key in the same secret,
          # then compute its SHA-256 over the DER-encoded SPKI. This way the
          # approval JSON's approval_pubkey_sha256 always matches the key we
          # just signed with — rotating the secret can't leave a stale sha
          # embedded in the JSON.
          openssl pkey -in "$KEYFILE" -pubout -out "$PUBFILE"
          PUBKEY_SHA256=$(openssl pkey -pubin -in "$PUBFILE" -outform DER \
            | sha256sum | awk '{print $1}')

          NONCE_SHA256=$(printf '%s' "$NONCE" | sha256sum | awk '{print $1}')
          APPROVED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EXPIRES_AT=$(date -u -d '+5 minutes' +%Y-%m-%dT%H:%M:%SZ)

          mkdir -p approvals
          cat > approvals/current.json << JSON
          {
            "schema": "pocket_lab_signed_approval_v1",
            "approved": true,
            "pdf_sha256": "$PDF_SHA256",
            "nonce_sha256": "$NONCE_SHA256",
            "approved_by": "$APPROVED_BY",
            "approved_at_utc": "$APPROVED_AT",
            "expires_at_utc": "$EXPIRES_AT",
            "repo": "${{ github.repository }}",
            "run_id": "$RUN_ID",
            "approval_pubkey_sha256": "$PUBKEY_SHA256"
          }
          JSON

          openssl dgst -sha256 -sign "$KEYFILE" \
            -out approvals/current.json.sig approvals/current.json

          # Post-sign self-verify: fail hard if openssl cannot verify the
          # signature we just produced against the derived public key.
          openssl dgst -sha256 -verify "$PUBFILE" \
            -signature approvals/current.json.sig approvals/current.json

          git config user.name "Pocket Lab Bot"
          git config user.email "bot@pocket-lab"
          git add approvals/
          git commit -m "Signed approval for run $RUN_ID by $APPROVED_BY"
          git push

