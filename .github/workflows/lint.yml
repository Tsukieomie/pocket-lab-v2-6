name: Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC1091: "not following — file not found" — the scripts source
          # on-device files (e.g. /root/.pocket_lab_secure/...) that don't
          # exist in the CI workspace. Everything else should be flagged.
          SHELLCHECK_OPTS: -x -e SC1091
        with:
          scandir: '.'
          severity: warning

